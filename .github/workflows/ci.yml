name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: [self-hosted, Linux, X64]
    # Do not run untrusted fork PR code on the self-hosted runner.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ansible-core flake8
      - run: flake8 plugins/ --max-line-length 120 --ignore E501,W503,E402
      - run: ansible-galaxy collection build --force
      - run: ansible-galaxy collection install geiserx-genieacs-*.tar.gz
      - run: |
          ansible-doc -t inventory geiserx.genieacs.genieacs > /dev/null
          ansible-doc geiserx.genieacs.genieacs_task > /dev/null
          ansible-doc geiserx.genieacs.genieacs_preset > /dev/null
          ansible-doc geiserx.genieacs.genieacs_provision > /dev/null
      - name: Run ansible-test sanity
        run: |
          cd ~/.ansible/collections/ansible_collections/geiserx/genieacs
          ansible-test sanity --test validate-modules --test replace-urlopen --python 3.12
